<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" role="img" aria-label="Memo FS">
  <defs>
    <style>
      .layer-top { fill: #258acb; }
      .layer-mid { fill: #2c9ab8; }
      .layer-btm { fill: #4cae61; }
      .accent { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .layer-top { fill: #4fb2f3; }
        .layer-mid { fill: #3ec4d8; }
        .layer-btm { fill: #5bd473; }
      }
    </style>
  </defs>

  <!-- Bottom layer of memory stack -->
  <polygon class="layer-btm" points="50,82 12,62 50,45 88,62" />
  <!-- Middle layer of memory stack -->
  <polygon class="layer-mid" points="50,63 12,43 50,26 88,43" />
  <!-- Top layer of memory stack with memory node -->
  <polygon class="layer-top" points="50,45 12,25 50,8 88,25" />
  <!-- Data burst accent -->
  <circle class="accent" cx="50" cy="23" r="3.5" />
  <circle class="accent" cx="35" cy="30" r="1.5" opacity="0.6" />
  <circle class="accent" cx="65" cy="30" r="1.5" opacity="0.6" />
  <circle class="accent" cx="50" cy="37" r="1.5" opacity="0.6" />
</svg>
