# Minimal wrangler config for the workers-pool Vitest suite.
#
# The pool's `SELF` is `tests/workers/worker.ts` (auto-detected as the Worker
# entry). This config only declares the bindings the integration suite touches
# (R2 + the AI binding the health app never reads but that the env factory
# expects to exist). It intentionally does NOT declare the `[assets]` binding —
# the harness serves no static assets and pointing at `./build/client` would
# force a build before tests can run.
name = "memofs-cloud-test"
compatibility_date = "2026-06-24"
compatibility_flags = ["nodejs_compat"]
main = "./tests/workers/worker.ts"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "memofs-blobs-test"

[ai]
binding = "AI"
